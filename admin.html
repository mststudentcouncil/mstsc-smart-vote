<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบจัดการการลงคะแนน (Admin e-Voting)</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/yxjxZmRN/Logo_mstsc_(1)_(1).png">
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Anuphan', 'sans-serif'] } } } }</script>
    <style> body { font-family: 'Anuphan', sans-serif; background-color: #f3f4f6; } </style>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#581c87">
</head>
<body class="text-gray-800">

    <nav class="bg-purple-900 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://i.postimg.cc/yxjxZmRN/Logo_mstsc_(1)_(1).png" alt="MSTSC Logo" class="w-10 h-10 bg-white rounded-full p-0.5 shadow-sm">
                <div>
                    <h1 class="text-sm md:text-base font-bold tracking-wide">ระบบจัดการการลงคะแนน (Admin e-Voting)</h1>
                    <p class="text-[10px] text-purple-200 hidden md:block">คณะกรรมการสภานักเรียน โรงเรียนเมืองสุราษฎร์ธานี</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="adminEmail" class="text-sm font-medium hidden sm:block text-purple-200"></span>
                <button id="logoutBtn" class="bg-red-600 hover:bg-red-700 text-white px-4 py-1.5 rounded-md text-sm font-medium transition-all shadow-sm">ออกจากระบบ</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 sm:p-6 mt-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 h-fit">
                <div class="flex items-center justify-between mb-6 pb-3 border-b border-gray-100">
                    <div class="flex items-center gap-2">
                        <svg class="w-5 h-5 text-purple-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        <h2 class="text-lg font-bold text-gray-800" id="formTitle">สร้างรายการลงคะแนน</h2>
                    </div>
                    <button id="cancelEditBtn" class="hidden text-xs bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1 rounded-md transition-colors">ยกเลิกการแก้ไข</button>
                </div>
                
                <form id="createCampaignForm" class="space-y-4">
                    <input type="hidden" id="editingId" value="">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">หัวข้อการลงคะแนน</label>
                        <input type="text" id="title" required class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-1 focus:ring-purple-600 focus:border-purple-600 text-sm transition-colors" placeholder="ระบุหัวข้อ...">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">รายละเอียด (ระบุหรือไม่ก็ได้)</label>
                        <textarea id="desc" rows="2" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-1 focus:ring-purple-600 focus:border-purple-600 text-sm transition-colors" placeholder="คำอธิบายเพิ่มเติม..."></textarea>
                    </div>

                    <div class="bg-blue-50 p-3 rounded-lg border border-blue-200">
                        <label class="block text-sm font-semibold text-blue-900 mb-1 flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                            ผู้มีสิทธิ์ลงคะแนน
                        </label>
                        <select id="voterTargetType" class="w-full border border-blue-300 rounded-lg p-2 text-sm focus:ring-1 focus:ring-blue-600 bg-white">
                            <option value="all">นักเรียนทุกคน (ทุกระดับชั้น)</option>
                            <option value="junior">เฉพาะ ม.ต้น (ม.1 - ม.3)</option>
                            <option value="senior">เฉพาะ ม.ปลาย (ม.4 - ม.6)</option>
                            <option value="custom_level">ระบุชั้นปีเอง (เลือกได้หลายชั้น)</option>
                            <option value="custom_room">ระบุห้องเรียนเอง (เจาะจงห้อง)</option>
                        </select>
                        <div id="customLevelContainer" class="hidden mt-3 p-2 bg-white rounded border border-blue-100 flex flex-wrap gap-4 text-sm font-medium text-gray-700">
                            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" name="targetLevel" value="ม.1" class="w-4 h-4 text-blue-600"> ม.1</label>
                            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" name="targetLevel" value="ม.2" class="w-4 h-4 text-blue-600"> ม.2</label>
                            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" name="targetLevel" value="ม.3" class="w-4 h-4 text-blue-600"> ม.3</label>
                            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" name="targetLevel" value="ม.4" class="w-4 h-4 text-blue-600"> ม.4</label>
                            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" name="targetLevel" value="ม.5" class="w-4 h-4 text-blue-600"> ม.5</label>
                            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" name="targetLevel" value="ม.6" class="w-4 h-4 text-blue-600"> ม.6</label>
                        </div>
                        <div id="customRoomContainer" class="hidden mt-3">
                            <input type="text" id="customRoomInput" class="w-full border border-blue-200 rounded p-2 text-sm" placeholder="เช่น ม.1/1, ม.2/3, ม.6/1 (คั่นด้วยลูกน้ำ)">
                        </div>
                    </div>
                    
                    <div class="bg-purple-50 p-3 rounded-lg border border-purple-100">
                        <label class="block text-sm font-semibold text-purple-900 mb-1 flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            กำหนดเวลาปิดระบบ
                        </label>
                        <input type="datetime-local" id="endTime" class="w-full border border-purple-200 rounded-lg p-2 focus:ring-1 focus:ring-purple-600 focus:border-purple-600 text-sm bg-white">
                    </div>
                    
                    <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                        <div class="flex justify-between items-end mb-3">
                            <label class="block text-sm font-semibold text-gray-800">รายการ / ตัวเลือก</label>
                            <span class="text-[10px] text-gray-500">รองรับลิงก์ Google Drive หรือลิงก์ภาพปกติ</span>
                        </div>
                        <div id="optionsContainer" class="space-y-3">
                            <div class="option-group bg-white p-3 rounded-lg border border-gray-200 shadow-sm relative">
                                <input type="text" class="opt-name w-full border-b border-gray-200 pb-1 mb-2 focus:outline-none focus:border-purple-600 text-sm font-medium" placeholder="รายการหรือตัวเลือกที่ 1" required>
                                <input type="url" class="opt-img w-full text-xs text-gray-500 focus:outline-none" placeholder="ลิงก์รูปภาพ (ไม่บังคับ)">
                            </div>
                            <div class="option-group bg-white p-3 rounded-lg border border-gray-200 shadow-sm relative">
                                <input type="text" class="opt-name w-full border-b border-gray-200 pb-1 mb-2 focus:outline-none focus:border-purple-600 text-sm font-medium" placeholder="รายการหรือตัวเลือกที่ 2" required>
                                <input type="url" class="opt-img w-full text-xs text-gray-500 focus:outline-none" placeholder="ลิงก์รูปภาพ (ไม่บังคับ)">
                            </div>
                        </div>
                        <button type="button" id="addOptionBtn" class="mt-3 w-full flex items-center justify-center gap-1 border border-dashed border-purple-300 text-purple-700 hover:bg-purple-100 font-medium py-2 rounded-lg transition-colors text-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> เพิ่มตัวเลือก
                        </button>
                    </div>

                    <button type="submit" id="submitCampaignBtn" class="w-full flex items-center justify-center gap-2 bg-purple-700 hover:bg-purple-800 text-white font-semibold text-base py-2.5 px-4 rounded-lg shadow-sm transition-all">
                        บันทึกและเปิดระบบ
                    </button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="flex items-center gap-2 mb-4 border-b border-gray-100 pb-3">
                    <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <h2 class="text-lg font-bold text-gray-800">ฐานข้อมูลนักเรียน (อัปโหลด Excel)</h2>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1">อัปโหลดไฟล์รายชื่อนักเรียน <span class="text-purple-600 font-normal">(.xlsx, .xls, .csv)</span></label>
                        <input type="file" id="excelFileInput" accept=".xlsx, .xls, .csv" multiple class="w-full border border-gray-300 rounded-md p-2 text-xs focus:ring-1 focus:ring-blue-500 bg-gray-50 cursor-pointer">
                        <p class="text-[10px] text-gray-500 mt-1">* ระบบจะทำการอ่านรายชื่อจากทุกแผ่นงาน (Sheet) อัตโนมัติ</p>
                    </div>
                    <div class="flex gap-2">
                        <button id="importStudentsBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-md text-sm font-medium transition-colors flex items-center justify-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg> นำเข้าข้อมูล
                        </button>
                        <button id="deleteStudentsBtn" class="bg-white border border-red-300 text-red-600 hover:bg-red-50 px-3 py-2 rounded-md text-sm font-medium transition-colors">ลบทั้งหมด</button>
                    </div>
                    <p class="text-xs text-gray-600 bg-blue-50 p-3 rounded border border-blue-100 leading-relaxed" id="lastUpdatedText">กำลังโหลดข้อมูล...</p>
                    
                    <button id="viewDatabaseBtn" type="button" class="w-full bg-indigo-50 border border-indigo-200 text-indigo-700 hover:bg-indigo-100 py-2.5 rounded-md text-sm font-bold transition-colors flex items-center justify-center gap-2 shadow-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg> ตรวจสอบข้อมูลและรายชื่อห้อง
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2">
            <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2 border-b border-gray-200 pb-2">
                <svg class="w-6 h-6 text-purple-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                รายการลงคะแนนทั้งหมด
            </h2>
            <div id="campaignList" class="space-y-6"></div>
        </div>
    </div>
    <script type="module" src="admin.js"></script>
</body>
</html>
