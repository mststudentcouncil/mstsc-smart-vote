<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>หน้านักเรียน - MSTSC Smart Vote</title>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Anuphan', 'sans-serif'] } } } }</script>
    <style>
        body { font-family: 'Anuphan', sans-serif; }
        .peer:checked + .card-content { border-color: #9333ea; background-color: #faf5ff; border-width: 2px;}
        .peer:checked + .card-content .check-icon { display: block; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans selection:bg-purple-300">

    <nav class="bg-gradient-to-r from-purple-800 to-purple-600 text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="bg-yellow-400 text-purple-900 font-black p-1.5 rounded-lg text-xs">MSTSC</div>
            <h1 class="text-lg font-bold tracking-tight">Smart Vote</h1>
        </div>
        <div class="flex items-center gap-3">
            <span id="userEmail" class="text-xs text-purple-200 hidden sm:block"></span>
            <button id="logoutBtn" class="bg-white/20 hover:bg-white/30 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-medium transition-all">ออกจากระบบ</button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-4 sm:p-6 mt-2">
        
        <div class="mb-6 relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <input type="text" id="searchInput" class="w-full pl-10 pr-4 py-3 rounded-xl border border-purple-200 focus:outline-none focus:ring-2 focus:ring-purple-500 shadow-sm transition-all text-sm" placeholder="ค้นหาหัวข้อกิจกรรมที่ต้องการโหวต...">
        </div>

        <div class="flex items-center gap-2 mb-4 border-b border-gray-200 pb-3">
            <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg>
            <h2 class="text-xl sm:text-2xl font-black text-purple-900">รายการที่เปิดให้โหวต</h2>
        </div>
        
        <div id="campaignList" class="space-y-6 pb-10">
            <div class="flex justify-center py-10"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-purple-600"></div></div>
        </div>
    </div>

    <script type="module" src="student.js"></script>
</body>
</html>
