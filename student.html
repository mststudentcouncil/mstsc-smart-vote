<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบลงคะแนนอิเล็กทรอนิกส์ - e-Voting</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/yxjxZmRN/Logo_mstsc_(1)_(1).png">
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Anuphan', 'sans-serif'] } } } }</script>
    <style>
        body { font-family: 'Anuphan', sans-serif; background-color: #f3f4f6; }
        .peer:checked + .card-content { border-color: #6b21a8; background-color: #faf5ff; border-width: 2px;}
        .peer:checked + .card-content .check-icon { display: block; }
        .peer:checked + .card-content .candidate-num { background-color: #6b21a8; color: white; }
    </style>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#581c87">
</head>
<body class="text-gray-800">

    <nav class="bg-purple-900 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-3 py-2 sm:py-3 flex justify-between items-center gap-1 sm:gap-2">
            <div class="flex items-center gap-2 sm:gap-3 shrink-0">
                <img src="https://i.postimg.cc/yxjxZmRN/Logo_mstsc_(1)_(1).png" alt="MSTSC Logo" class="w-8 h-8 sm:w-10 sm:h-10 bg-white rounded-full p-0.5 shadow-sm">
                <div class="hidden sm:block">
                    <h1 class="text-sm md:text-base font-bold tracking-wide">ระบบลงคะแนนอิเล็กทรอนิกส์ (e-Voting)</h1>
                    <p class="text-[10px] text-purple-200">คณะกรรมการสภานักเรียนโรงเรียนเมืองสุราษฎร์ธานี</p>
                </div>
                <div class="sm:hidden"><h1 class="text-[13px] font-bold tracking-wide">e-Voting</h1></div>
            </div>
            <div class="flex items-center gap-2 sm:gap-4 justify-end min-w-0">
                <div class="text-right">
                    <p id="userEmail" class="text-[11px] sm:text-sm font-medium leading-tight text-white">กำลังโหลด...</p>
                </div>
                <button id="logoutBtn" class="bg-red-600 hover:bg-red-700 text-white px-2 py-1.5 sm:px-4 sm:py-1.5 rounded-md text-[10px] sm:text-sm font-medium transition-all shadow-sm shrink-0">ออกจากระบบ</button>
            </div>
        </div>
    </nav>

    <div class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-6">
            <h2 class="text-lg font-bold text-purple-900 mb-4 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                ขั้นตอนการลงคะแนน
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
                <div class="bg-purple-50 p-3 rounded-lg border border-purple-100"><span class="bg-purple-600 text-white w-6 h-6 rounded-full inline-flex items-center justify-center font-bold text-xs mb-2">1</span><p class="font-medium text-gray-800">เลือกรายการลงคะแนน</p><p class="text-xs text-gray-500 mt-1">ตรวจสอบรายการที่เปิดรับในระบบ</p></div>
                <div class="bg-purple-50 p-3 rounded-lg border border-purple-100"><span class="bg-purple-600 text-white w-6 h-6 rounded-full inline-flex items-center justify-center font-bold text-xs mb-2">2</span><p class="font-medium text-gray-800">เลือกหมายเลข / ตัวเลือก</p><p class="text-xs text-gray-500 mt-1">คลิกที่การ์ดหมายเลขที่ท่านต้องการ</p></div>
                <div class="bg-purple-50 p-3 rounded-lg border border-purple-100"><span class="bg-purple-600 text-white w-6 h-6 rounded-full inline-flex items-center justify-center font-bold text-xs mb-2">3</span><p class="font-medium text-gray-800">กดยืนยันสิทธิ์</p><p class="text-xs text-gray-500 mt-1">ตรวจสอบความถูกต้องและยืนยันข้อมูล</p></div>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="mb-6 relative max-w-md">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <input type="text" id="searchInput" class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-600 focus:border-purple-600 shadow-sm text-sm" placeholder="ค้นหาชื่อการเลือกตั้ง หรือกิจกรรม...">
        </div>

        <div id="campaignList" class="space-y-8 pb-10">
            <div class="flex justify-center py-10"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-purple-800"></div></div>
        </div>
    </div>

    <script type="module" src="student.js"></script>
</body>
</html>
